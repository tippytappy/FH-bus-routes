<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --panel: #fffcf7;
    --border: #e0d8cc;
    --text: #2a2218;
    --muted: #8a7f72;
    --accent: #c1440e;
    --accent2: #1a6b4a;
    --shadow: 0 4px 24px rgba(42,34,24,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--text);
    color: var(--bg);
    padding: 12px 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    letter-spacing: 0.01em;
  }

  header span {
    font-size: 0.78rem;
    opacity: 0.55;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 900;
  }

  .sidebar-section {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 0.88rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Travel time slider */
  .slider-wrap {
    position: relative;
    padding-bottom: 4px;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .slider-value {
    font-size: 1.5rem;
    font-family: 'DM Serif Display', serif;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 10px;
  }

  .slider-value span {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 400;
    margin-left: 4px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--panel);
    box-shadow: 0 0 0 1.5px var(--accent);
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .slider-hint {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.4;
  }

  /* Route toggles */
  .routes-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    max-height: 400px;
  }

  .route-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    user-select: none;
    border: 1.5px solid transparent;
  }

  .route-toggle:hover {
    background: var(--bg);
  }

  .route-toggle.active {
    border-color: currentColor;
    background: var(--bg);
  }

  .route-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(0,0,0,0.12);
  }

  .route-name {
    font-size: 0.82rem;
    font-weight: 500;
    flex: 1;
  }

  .route-count {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .toggle-all-btn {
    width: 100%;
    padding: 7px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 10px;
    transition: all 0.12s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .toggle-all-btn:hover {
    background: var(--bg);
    color: var(--text);
    border-color: var(--text);
  }

  /* Stats bar */
  .stats-bar {
    padding: 12px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    margin-top: auto;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    gap: 14px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat strong {
    font-size: 1.1rem;
    font-family: 'DM Serif Display', serif;
    color: var(--text);
    line-height: 1;
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    background: var(--panel);
    border-radius: 10px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 0;
    overflow: hidden;
  }

  .leaflet-popup-content {
    margin: 0;
    min-width: 200px;
  }

  .popup-header {
    background: var(--text);
    color: var(--bg);
    padding: 10px 14px;
  }

  .popup-route {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.6;
    margin-bottom: 3px;
  }

  .popup-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    line-height: 1.2;
  }

  .popup-body {
    padding: 10px 14px;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .popup-time-block {
    text-align: center;
  }

  .popup-time-label {
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  .popup-time-val {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--accent);
    line-height: 1;
  }

  .popup-travel {
    color: var(--accent2);
  }

  .popup-stop-time {
    color: var(--text);
  }

  .popup-divider {
    width: 1px;
    height: 36px;
    background: var(--border);
  }

  .popup-maps-link {
    display: block;
    text-align: center;
    padding: 8px;
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    text-decoration: none;
    transition: background 0.12s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .popup-maps-link:hover {
    background: var(--bg);
    color: var(--text);
  }

  .leaflet-popup-tip {
    background: var(--panel);
  }

  /* School marker */
  .school-icon-div {
    background: var(--accent);
    border: 3px solid white;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
  }
</style>

  {route:"Yateley AM",order:9,name:"Farnborough Hill",time:"08:25",lat:51.30244195,lng:-0.750565767,url:"https://www.google.com/maps?q=51.30244195 -0.7505657674"},
];

// ── HELPERS ───────────────────────────────────────────────────────────────
function toMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

// Per-route arrival time (last stop = Farnborough Hill)
const routeArrival = {};
rawData.forEach(d => {
  const cur = toMinutes(d.time);
  if (!routeArrival[d.route] || cur > routeArrival[d.route]) {
    routeArrival[d.route] = cur;
  }
});

// Enrich data with travelMinutes
const stops = rawData.map(d => ({
  ...d,
  isFH: d.name === 'Farnborough Hill',
  travelMin: routeArrival[d.route] - toMinutes(d.time)
}));

// ── ROUTE COLOURS ─────────────────────────────────────────────────────────
const routes = [...new Set(stops.map(s => s.route))];
const palette = [
  '#c1440e','#1a6b4a','#2563a8','#7c3aad','#b45309',
  '#0d7677','#c2185b','#3d5a80','#5b7f3e','#7b4a1a','#1a5276'
];
const routeColour = {};
routes.forEach((r, i) => routeColour[r] = palette[i % palette.length]);

// ── MAP INIT ──────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [51.28, -0.76],
  zoom: 10,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// School marker
const schoolIcon = L.divIcon({
  className: '',
  html: `<div class="school-icon-div" style="width:34px;height:34px;">FH</div>`,
  iconSize: [34, 34],
  iconAnchor: [17, 17],
  popupAnchor: [0, -20]
});

L.marker([51.30244195, -0.750565767], {icon: schoolIcon})
  .addTo(map)
  .bindPopup('<div style="padding:10px 14px;font-family:DM Serif Display,serif;font-size:1rem;">🏫 Farnborough Hill School</div>');

// ── MARKERS ───────────────────────────────────────────────────────────────
function makeIcon(colour, travelMin) {
  const hue = travelMin;
  // colour the ring green→amber→red based on travel time
  const ringColour = travelMin <= 20 ? '#1a6b4a' : travelMin <= 40 ? '#b45309' : '#c1440e';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:${colour};
      border:2.5px solid white;
      box-shadow:0 1px 5px rgba(0,0,0,0.3),0 0 0 2px ${colour}44;
    "></div>`,
    iconSize: [14,14],
    iconAnchor: [7,7],
    popupAnchor: [0,-10]
  });
}

const markersByStop = {}; // key = index in stops[]

stops.forEach((stop, idx) => {
  if (stop.isFH) return; // skip FH stops

  const colour = routeColour[stop.route];
  const icon = makeIcon(colour, stop.travelMin);

  const popupHtml = `
    <div class="popup-header">
      <div class="popup-route">${stop.route}</div>
      <div class="popup-name">${stop.name}</div>
    </div>
    <div class="popup-body">
      <div class="popup-time-block">
        <div class="popup-time-label">Departs</div>
        <div class="popup-time-val popup-stop-time">${stop.time}</div>
      </div>
      <div class="popup-divider"></div>
      <div class="popup-time-block">
        <div class="popup-time-label">To school</div>
        <div class="popup-time-val popup-travel">${stop.travelMin} min</div>
      </div>
    </div>
    <a class="popup-maps-link" href="${stop.url}" target="_blank">Open in Google Maps ↗</a>
  `;

  const marker = L.marker([stop.lat, stop.lng], {icon})
    .bindPopup(popupHtml, {maxWidth: 260});

  markersByStop[idx] = { marker, stop };
});

// Route polylines
const polylines = {};
routes.forEach(route => {
  const pts = stops
    .filter(s => s.route === route)
    .sort((a,b) => a.order - b.order)
    .map(s => [s.lat, s.lng]);
  polylines[route] = L.polyline(pts, {
    color: routeColour[route],
    weight: 2.5,
    opacity: 0.45,
    dashArray: '5,6'
  });
});

// ── STATE ──────────────────────────────────────────────────────────────────
const visibleRoutes = new Set(routes);
let maxTravelFilter = 65; // set properly below

// compute actual min/max
const travelTimes = stops.filter(s=>!s.isFH).map(s=>s.travelMin);
const globalMin = Math.min(...travelTimes);
const globalMax = Math.max(...travelTimes);
maxTravelFilter = globalMax;

// set slider
const slider = document.getElementById('timeSlider');
slider.min = globalMin;
slider.max = globalMax;
slider.value = globalMax;
document.getElementById('minLabel').textContent = `${globalMin} min`;
document.getElementById('maxLabel').textContent = `${globalMax} min`;
document.getElementById('sliderDisplay').innerHTML = `${globalMax} <span>min max</span>`;
document.getElementById('sliderHintVal').textContent = globalMax;

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  let visibleCount = 0;
  let activeRouteCount = 0;
  const seenRoutes = new Set();

  Object.entries(markersByStop).forEach(([idx, {marker, stop}]) => {
    const routeOn = visibleRoutes.has(stop.route);
    const timeOk  = stop.travelMin <= maxTravelFilter;
    if (routeOn && timeOk) {
      marker.addTo(map);
      visibleCount++;
      seenRoutes.add(stop.route);
    } else {
      marker.remove();
    }
  });

  routes.forEach(route => {
    if (visibleRoutes.has(route)) {
      polylines[route].addTo(map);
    } else {
      polylines[route].remove();
    }
  });

  // update stats
  document.getElementById('statVisible').textContent = visibleCount;
  document.getElementById('statRoutes').textContent = seenRoutes.size;

  // update route counts in sidebar
  routes.forEach(route => {
    const countEl = document.getElementById(`count-${route.replace(/\s/g,'_')}`);
    if (countEl) {
      const shown = stops.filter(s => s.route===route && !s.isFH && s.travelMin<=maxTravelFilter).length;
      const total = stops.filter(s => s.route===route && !s.isFH).length;
      countEl.textContent = visibleRoutes.has(route) ? `${shown}/${total}` : `0/${total}`;
    }
  });
}

// ── SLIDER ────────────────────────────────────────────────────────────────
slider.addEventListener('input', () => {
  maxTravelFilter = parseInt(slider.value);
  document.getElementById('sliderDisplay').innerHTML = `${maxTravelFilter} <span>min max</span>`;
  document.getElementById('sliderHintVal').textContent = maxTravelFilter;
  render();
});

// ── ROUTE TOGGLES ─────────────────────────────────────────────────────────
const routesList = document.getElementById('routesList');

routes.forEach(route => {
  const stopCount = stops.filter(s => s.route===route && !s.isFH).length;
  const id = `toggle-${route.replace(/\s/g,'_')}`;
  const colId = `count-${route.replace(/\s/g,'_')}`;

  const el = document.createElement('label');
  el.className = 'route-toggle active';
  el.style.color = routeColour[route];
  el.innerHTML = `
    <input type="checkbox" id="${id}" checked style="display:none">
    <div class="route-dot" style="background:${routeColour[route]}"></div>
    <span class="route-name" style="color:var(--text)">${route.replace(' AM','')}</span>
    <span class="route-count" id="${colId}">${stopCount}/${stopCount}</span>
  `;

  el.addEventListener('click', () => {
    const cb = el.querySelector('input');
    cb.checked = !cb.checked;
    if (cb.checked) {
      visibleRoutes.add(route);
      el.classList.add('active');
    } else {
      visibleRoutes.delete(route);
      el.classList.remove('active');
    }
    updateToggleAllBtn();
    render();
  });

  routesList.appendChild(el);
});

function updateToggleAllBtn() {
  const btn = document.getElementById('toggleAllBtn');
  btn.textContent = visibleRoutes.size === routes.length ? 'Hide All' : 'Show All';
}

document.getElementById('toggleAllBtn').addEventListener('click', () => {
  if (visibleRoutes.size === routes.length) {
    routes.forEach(r => visibleRoutes.delete(r));
    document.querySelectorAll('.route-toggle').forEach(el => {
      el.classList.remove('active');
      el.querySelector('input').checked = false;
    });
  } else {
    routes.forEach(r => visibleRoutes.add(r));
    document.querySelectorAll('.route-toggle').forEach(el => {
      el.classList.add('active');
      el.querySelector('input').checked = true;
    });
  }
  updateToggleAllBtn();
  render();
});

// initial render
render();
</script>
